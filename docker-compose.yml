services:
  postgres:
    image: postgres:17
    container_name: medai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medai
    ports:
      - "5432:5432"
    volumes:
      - medai_pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: medai-ollama
    ports:
      - "11434:11434"
    volumes:
      - medai_ollama:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - medai_qdrant:/qdrant/storage

volumes:
  medai_pgdata:
  medai_ollama:
  medai_qdrant:
  medai_pgadmin:
