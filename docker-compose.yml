services:
  ollama:
    image: ollama/ollama:latest
    container_name: medai-ollama
    ports:
      - "11434:11434"
    volumes:
      - medai_ollama:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medai-qdrant
    ports:
      - "6333:6333"
    volumes:
      - medai_qdrant:/qdrant/storage

volumes:
  medai_ollama:
  medai_qdrant:
